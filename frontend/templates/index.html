<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - Mock Grocery</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>Fresh Groceries Home</h1>
        <a href="/cart" id="nav-cart" class="nav-btn">View Cart</a>
    </header>
    
    <main>
        <!-- NEW: User Intent Input -->
        <!-- Replace your existing #goal-container with this -->
        <div id="goal-container" style="margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 8px;">
            <h2>Your Shopping List</h2>
            <!-- External memory aid for the user -->
            <ul id="visual-shopping-list" style="min-height: 40px; background: #f9f9f9; padding: 15px; border-radius: 5px; font-size: 18px; margin-bottom: 15px;">
                <!-- Items will appear here -->
            </ul>
            
            <label for="item-input"><strong>Add an item to buy:</strong></label><br><br>
            <input type="text" id="item-input" placeholder="e.g. Milk" style="width: 60%; padding: 10px; font-size: 18px;">
            
            <button id="add-item-btn" class="action-btn" onclick="addItem()">Add to List</button>
            <button id="clear-list-btn" class="action-btn" onclick="clearList()" style="background-color: #dc3545; margin-left: 10px;">Start Over</button>
        </div>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search for groceries..." style="padding: 10px; font-size: 18px;">
            <!-- Changed from <a> to <button> to trigger the simulated search routing -->
            <button id="search-btn" class="action-btn" onclick="performSearch(event)">Search</button>
        </div>
    </main>

    <div id="guidance-panel" aria-live="polite">
        <p id="guidance-text">Loading guidance...</p>
    </div>
    <script src="/static/js/dom_parser.js"></script>
</body>
</html>
